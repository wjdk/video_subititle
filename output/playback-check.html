<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playback Check</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #111;
      }

      video {
        width: min(100vw, 900px);
      }
    </style>
  </head>
  <body>
    <video id="video" controls muted playsinline></video>
    <script>
      const params = new URLSearchParams(window.location.search);
      const video = document.querySelector("#video");
      const targetTime = Number(params.get("t") || 16);
      let didSeek = false;

      function seekWhenReady() {
        if (didSeek || !Number.isFinite(video.duration) || video.readyState < 1) return;
        didSeek = true;
        video.currentTime = Math.min(targetTime, Math.max(0, video.duration - 0.25));
      }

      video.src = params.get("src") || "./elephants-dream-subtitled-40s.webm";
      video.addEventListener("loadedmetadata", seekWhenReady);
      video.addEventListener("durationchange", seekWhenReady);
      video.addEventListener("canplay", seekWhenReady);
      video.addEventListener("seeked", () => {
        video.pause();
      });
    </script>
  </body>
</html>
